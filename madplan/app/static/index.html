<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #14171f; --surface2: #1c2030;
    --border: #252a3a; --accent: #4af0a0; --accent2: #f0c44a; --accent3: #4ab4f0;
    --text: #e8eaf0; --muted: #5a6080; --danger: #f06060;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px; }
  .header-text h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 14px; letter-spacing: 0.02em; }
  .header-text p { font-size: 10px; color: var(--muted); margin-top: 1px; }

  .week-tabs { display: flex; gap: 3px; flex-wrap: wrap; }
  .tab { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 7px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(74,240,160,0.08); }

  .header-right { display: flex; align-items: center; gap: 6px; }
  .btn { background: var(--accent); border: none; color: #0d0f14; font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 10px; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .btn-icon { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 16px; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .btn-icon:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-icon.active { border-color: var(--accent2); color: var(--accent2); background: rgba(240,196,74,0.1); }

  /* ── Main ── */
  .main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
  #grid-container { flex: 1; overflow-x: auto; overflow-y: auto; padding: 14px; }
  .meal-grid { display: grid; grid-template-columns: repeat(7, minmax(155px, 1fr)); gap: 10px; min-width: 1085px; }

  .day-col { display: flex; flex-direction: column; gap: 7px; }
  .day-header { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; text-align: center; }
  .day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 11px; }
  .day-date { font-size: 10px; color: var(--muted); margin-top: 1px; }
  .day-header.today { border-color: var(--accent); }
  .day-header.today .day-name { color: var(--accent); }
  .day-header.past { opacity: 0.55; }

  .meal-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 9px; cursor: pointer; transition: border-color 0.15s, background 0.15s; min-height: 76px; display: flex; flex-direction: column; gap: 3px; }
  .meal-card:hover { border-color: var(--accent); background: var(--surface2); }
  .meal-label { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500; }
  .meal-label.vegetarian { color: var(--accent); }
  .meal-label.kids { color: var(--accent2); }
  .meal-name { font-size: 11px; color: var(--text); line-height: 1.4; flex: 1; }
  .meal-empty { font-size: 10px; color: var(--muted); font-style: italic; flex: 1; display: flex; align-items: center; }
  .meal-hint { font-size: 9px; color: var(--muted); }

  /* Thaw reminder */
  .thaw-card { background: rgba(74,180,240,0.06); border: 1px solid rgba(74,180,240,0.25); border-radius: 8px; padding: 6px 9px; display: flex; align-items: flex-start; gap: 5px; }
  .thaw-icon { font-size: 13px; flex-shrink: 0; line-height: 1.4; }
  .thaw-text { font-size: 10px; color: var(--accent3); line-height: 1.4; }
  .thaw-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

  /* ── Chat panel ── */
  #chat-panel { background: var(--surface); border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; transition: height 0.25s ease; height: 44px; overflow: hidden; }
  #chat-panel.open { height: 280px; }
  #chat-toggle { display: flex; align-items: center; justify-content: space-between; padding: 11px 16px; cursor: pointer; user-select: none; flex-shrink: 0; font-size: 11px; color: var(--muted); }
  #chat-toggle:hover { color: var(--text); }
  #chat-toggle .chevron { font-size: 9px; transition: transform 0.2s; }
  #chat-panel.open #chat-toggle .chevron { transform: rotate(180deg); }
  #chat-messages { flex: 1; overflow-y: auto; padding: 0 14px 6px; display: flex; flex-direction: column; gap: 6px; }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { max-width: 80%; padding: 7px 11px; border-radius: 9px; font-size: 11px; line-height: 1.5; }
  .msg.user { background: var(--surface2); border: 1px solid var(--border); align-self: flex-end; }
  .msg.assistant { background: rgba(74,240,160,0.07); border: 1px solid rgba(74,240,160,0.2); align-self: flex-start; }
  .thinking { display: flex; align-items: center; gap: 7px; padding: 5px 11px; font-size: 10px; color: var(--muted); align-self: flex-start; }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform:scale(0.6);opacity:0.4; } 40% { transform:scale(1);opacity:1; } }
  #chat-input-row { display: flex; gap: 7px; padding: 6px 14px 10px; flex-shrink: 0; }
  #chat-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 11px; border-radius: 8px; resize: none; height: 36px; outline: none; transition: border-color 0.15s; }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--muted); }

  /* ── Recipe modal ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 16px; }
  .modal-overlay.hidden { display: none; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 500px; max-height: 90dvh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .modal-header-text { flex: 1; min-width: 0; }
  .modal-meta { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3px; }
  .modal-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .modal-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; }
  .time-badge { display: inline-flex; align-items: center; gap: 3px; background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 2px 7px; font-size: 10px; color: var(--accent2); flex-shrink: 0; }
  .servings-row { display: flex; align-items: center; gap: 7px; font-size: 10px; color: var(--muted); }
  .servings-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 22px; height: 22px; border-radius: 5px; cursor: pointer; font-size: 13px; line-height: 1; display: flex; align-items: center; justify-content: center; transition: border-color 0.15s; }
  .servings-btn:hover { border-color: var(--accent); color: var(--accent); }
  .servings-count { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; color: var(--text); min-width: 16px; text-align: center; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; line-height: 1; padding: 2px; flex-shrink: 0; }
  .modal-close:hover { color: var(--text); }
  .modal-body { flex: 1; overflow-y: auto; padding: 14px 18px; display: flex; flex-direction: column; gap: 14px; }
  .modal-body::-webkit-scrollbar { width: 3px; }
  .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .recipe-description { font-size: 11px; color: var(--muted); line-height: 1.6; }
  .recipe-section-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 5px; }
  .ingredients-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
  .ingredients-list li { font-size: 11px; color: var(--text); padding: 4px 9px; background: var(--surface2); border-radius: 5px; line-height: 1.4; }
  .instructions-text { font-size: 11px; color: var(--text); line-height: 1.8; white-space: pre-wrap; }
  .modal-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; flex-wrap: wrap; }
  .btn-danger { background: none; border: 1px solid var(--danger); color: var(--danger); font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 7px; cursor: pointer; }
  .btn-danger:hover { background: rgba(240,96,96,0.1); }
  .btn-fav { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 10px; border-radius: 7px; cursor: pointer; transition: all 0.15s; }
  .btn-fav.active { border-color: var(--accent2); color: var(--accent2); }
  .btn-fav:hover { border-color: var(--accent2); color: var(--accent2); }
  .edit-mode { display: none; flex-direction: column; gap: 10px; padding: 14px 18px; flex: 1; overflow-y: auto; }
  .edit-mode.active { display: flex; }
  .modal-body.hidden { display: none; }
  .modal-footer.hidden { display: none; }
  .edit-label { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 3px; }
  .edit-input, .edit-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 7px 9px; border-radius: 7px; outline: none; transition: border-color 0.15s; }
  .edit-input:focus, .edit-textarea:focus { border-color: var(--accent); }
  .edit-textarea { resize: vertical; min-height: 70px; }
  .edit-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; }

  /* ── Favorites modal ── */
  .fav-modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 420px; max-height: 80dvh; display: flex; flex-direction: column; overflow: hidden; }
  .fav-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .fav-header h2 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .fav-body { flex: 1; overflow-y: auto; padding: 12px 18px; display: flex; flex-direction: column; gap: 6px; }
  .fav-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }
  .fav-group-label { font-size: 9px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
  .fav-item { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; gap: 8px; }
  .fav-item-name { font-size: 11px; color: var(--text); }
  .fav-remove { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; line-height: 1; }
  .fav-remove:hover { color: var(--danger); }

  /* ── Shopping list trigger card ── */
  .shopping-trigger-card { background: rgba(74,240,160,0.05); border: 1px dashed rgba(74,240,160,0.35); border-radius: 8px; padding: 8px 10px; cursor: pointer; display: flex; align-items: center; gap: 7px; transition: background 0.15s, border-color 0.15s; }
  .shopping-trigger-card:hover { background: rgba(74,240,160,0.1); border-color: var(--accent); }
  .shopping-trigger-card strong { font-size: 11px; color: var(--accent); }
  .shopping-sub { font-size: 9px; color: var(--muted); margin-left: auto; }

  /* ── Shopping list modal ── */
  .shop-modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90dvh; display: flex; flex-direction: column; overflow: hidden; }
  .shop-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .shop-header-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .shop-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .shop-subtitle { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
  .shop-badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .shop-badge { font-size: 9px; padding: 2px 7px; border-radius: 5px; border: 1px solid; }
  .shop-badge.live { border-color: var(--accent); color: var(--accent); background: rgba(74,240,160,0.08); }
  .shop-badge.ai { border-color: var(--border); color: var(--muted); }

  .shop-tabs { display: flex; gap: 3px; padding: 10px 18px 0; flex-shrink: 0; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .shop-tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 10px 8px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .shop-tab:hover { color: var(--text); }
  .shop-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .shop-tab .shop-count { font-size: 9px; color: var(--muted); margin-left: 3px; }
  .shop-tab.active .shop-count { color: var(--accent); }

  .shop-body { flex: 1; overflow-y: auto; padding: 12px 18px; }
  .shop-body::-webkit-scrollbar { width: 3px; }
  .shop-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .shop-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 12px 0; }
  .shop-item { display: flex; align-items: flex-start; gap: 9px; padding: 6px 0; border-bottom: 1px solid rgba(37,42,58,0.5); }
  .shop-item:last-child { border-bottom: none; }
  .shop-checkbox { width: 15px; height: 15px; border: 1px solid var(--border); border-radius: 3px; flex-shrink: 0; margin-top: 2px; cursor: pointer; appearance: none; background: var(--surface2); transition: background 0.15s; }
  .shop-checkbox:checked { background: var(--accent); border-color: var(--accent); }
  .shop-item-text { font-size: 11px; color: var(--text); line-height: 1.5; flex: 1; }
  .tilbud-badge { display: inline-block; background: rgba(240,196,74,0.15); border: 1px solid rgba(240,196,74,0.4); color: var(--accent2); font-size: 9px; padding: 1px 5px; border-radius: 4px; margin-left: 5px; white-space: nowrap; }

  .shop-footer { padding: 10px 18px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; }

  /* ── Spinner / Toast ── */
  .spinner { display: inline-block; width: 11px; height: 11px; border: 2px solid rgba(74,240,160,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #toast { position: fixed; bottom: 52px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); color: var(--text); font-size: 11px; padding: 7px 14px; border-radius: 8px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🥗</div>
    <div class="header-text">
      <h1>Madplan</h1>
      <p>Vegetarisk familiemadplan</p>
    </div>
  </div>
  <div class="week-tabs">
    <button class="tab" data-offset="-2">2 uger siden</button>
    <button class="tab" data-offset="-1">Forrige uge</button>
    <button class="tab active" data-offset="0">Denne uge</button>
    <button class="tab" data-offset="1">Næste uge</button>
    <button class="tab" data-offset="2">Om 2 uger</button>
  </div>
  <div class="header-right">
    <button class="btn-icon" id="favs-btn" title="Favoritter">⭐</button>
    <button class="btn" id="generate-btn">Generer uge</button>
  </div>
</header>

<div class="main">
  <div id="grid-container">
    <div class="meal-grid" id="meal-grid"></div>
  </div>
  <div id="chat-panel">
    <div id="chat-toggle">
      <span>Snak med assistenten</span>
      <span class="chevron">▲</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <textarea id="chat-input" placeholder="Bed assistenten om at ændre noget…"></textarea>
      <button class="btn" id="send-btn">Send</button>
    </div>
  </div>
</div>

<!-- Recipe modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-header-text">
        <div class="modal-meta" id="modal-meta"></div>
        <div class="modal-title-row">
          <div class="modal-title" id="modal-title"></div>
          <div class="time-badge" id="time-badge" style="display:none">⏱ <span id="time-value"></span></div>
        </div>
        <div class="servings-row" id="servings-row" style="display:none">
          <span>Portioner:</span>
          <button class="servings-btn" id="servings-dec">−</button>
          <span class="servings-count" id="servings-count"></span>
          <button class="servings-btn" id="servings-inc">+</button>
        </div>
      </div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <div class="recipe-description" id="recipe-description"></div>
      <div id="ingredients-section">
        <div class="recipe-section-label">Ingredienser</div>
        <ul class="ingredients-list" id="ingredients-list"></ul>
      </div>
      <div id="instructions-section">
        <div class="recipe-section-label">Fremgangsmåde</div>
        <div class="instructions-text" id="instructions-text"></div>
      </div>
    </div>
    <div class="modal-footer" id="modal-footer">
      <button class="btn-danger" id="modal-delete">Ryd ret</button>
      <button class="btn-fav" id="modal-fav-btn">⭐ Favorit</button>
      <button class="btn-ghost" id="modal-edit-btn">Rediger</button>
      <button class="btn" id="modal-close-btn">Luk</button>
    </div>
    <div class="edit-mode" id="edit-mode">
      <div>
        <label class="edit-label">Navn på retten</label>
        <input type="text" class="edit-input" id="edit-name" placeholder="fx Pasta med tomatsauce">
      </div>
      <div>
        <label class="edit-label">Kort beskrivelse</label>
        <input type="text" class="edit-input" id="edit-description">
      </div>
      <div style="display:flex;gap:8px">
        <div style="flex:1"><label class="edit-label">Tilberedningstid</label><input type="text" class="edit-input" id="edit-total-time" placeholder="fx 30 min"></div>
        <div style="width:90px"><label class="edit-label">Portioner</label><input type="number" class="edit-input" id="edit-servings" min="1" max="20"></div>
      </div>
      <div>
        <label class="edit-label">Ingredienser (én per linje)</label>
        <textarea class="edit-textarea" id="edit-ingredients" style="min-height:90px"></textarea>
      </div>
      <div>
        <label class="edit-label">Fremgangsmåde</label>
        <textarea class="edit-textarea" id="edit-instructions" style="min-height:110px"></textarea>
      </div>
      <div>
        <label class="edit-label">Optø dagen før (lad stå tomt hvis intet)</label>
        <input type="text" class="edit-input" id="edit-thaw" placeholder="fx 400g hakket oksekød">
      </div>
    </div>
    <div class="edit-footer hidden" id="edit-footer">
      <button class="btn-ghost" id="edit-cancel">Annuller</button>
      <button class="btn" id="edit-save">Gem</button>
    </div>
  </div>
</div>

<!-- Favorites modal -->
<div class="modal-overlay hidden" id="fav-overlay">
  <div class="fav-modal">
    <div class="fav-header">
      <h2>⭐ Favoritretter</h2>
      <button class="modal-close" id="fav-close">✕</button>
    </div>
    <div class="fav-body" id="fav-body"></div>
  </div>
</div>

<!-- Shopping list modal -->
<div class="modal-overlay hidden" id="shop-overlay">
  <div class="shop-modal">
    <div class="shop-header">
      <div class="shop-header-row">
        <div>
          <div class="shop-title">🛒 Indkøbsliste</div>
          <div class="shop-subtitle" id="shop-subtitle"></div>
          <div class="shop-badges" id="shop-badges"></div>
        </div>
        <button class="modal-close" id="shop-close">✕</button>
      </div>
    </div>
    <div class="shop-tabs" id="shop-tabs"></div>
    <div class="shop-body" id="shop-body">
      <div class="thinking" id="shop-thinking" style="padding:16px 0">
        <div class="dots"><span></span><span></span><span></span></div>
        <span>Henter tilbud og laver indkøbsliste…</span>
      </div>
    </div>
    <div class="shop-footer">
      <button class="btn-ghost" id="shop-regenerate">Generer igen</button>
      <button class="btn" id="shop-close-btn">Luk</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const DAY_NAMES = ['Mandag','Tirsdag','Onsdag','Torsdag','Fredag','Lørdag','Søndag'];
const MONTH_NAMES = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];

let state = { plan: {}, weekOffset: 0, generating: false, sending: false, favorites: [] };
let editTarget = null;
let modalServings = 0, modalBaseServings = 0, modalBaseIngredients = [];

// ── Date helpers (LOCAL time, not UTC) ── //
function localDate() {
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function todayISO() {
  const d = localDate();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function dayOfWeekMon(d) { return (d.getDay() + 6) % 7; } // 0=Mon … 6=Sun
function formatDayDate(d) { return `${d.getDate()}. ${MONTH_NAMES[d.getMonth()]}`; }

// Rolling week: start = today + offset * 7
function getStartDate(offset) {
  return addDays(localDate(), offset * 7);
}

// ── Load data ── //
async function loadPlan() {
  const res = await fetch('api/plan');
  if (!res.ok) return;
  state.plan = await res.json();
  renderGrid();
}

async function loadFavorites() {
  const res = await fetch('api/favorites');
  if (!res.ok) return;
  state.favorites = await res.json();
}

// ── Render grid ── //
function renderGrid() {
  const grid = document.getElementById('meal-grid');
  const today = todayISO();
  const startDate = getStartDate(state.weekOffset);
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = addDays(startDate, i);
    const key = isoDate(d);
    const isToday = key === today;
    const isPast = key < today;
    const nextKey = isoDate(addDays(d, 1));

    const col = document.createElement('div');
    col.className = 'day-col';

    // Day header
    const header = document.createElement('div');
    header.className = `day-header${isToday ? ' today' : ''}${isPast ? ' past' : ''}`;
    header.innerHTML = `<div class="day-name">${DAY_NAMES[dayOfWeekMon(d)]}</div><div class="day-date">${formatDayDate(d)}</div>`;
    col.appendChild(header);

    col.appendChild(makeMealCard(key, 'vegetarian'));
    col.appendChild(makeMealCard(key, 'kids'));

    // Thaw reminder: what needs to come out of freezer today for tomorrow's kids dish
    const tomorrowKids = state.plan[nextKey]?.kids;
    if (tomorrowKids?.thaw) {
      const thaw = document.createElement('div');
      thaw.className = 'thaw-card';
      thaw.innerHTML = `<div class="thaw-icon">🧊</div><div class="thaw-text"><div class="thaw-label">Optø til i morgen</div>${escapeHtml(tomorrowKids.thaw)}</div>`;
      col.appendChild(thaw);
    }

    // Shopping list trigger on Sundays
    if (dayOfWeekMon(d) === 6) {
      const shopCard = document.createElement('div');
      shopCard.className = 'shopping-trigger-card';
      shopCard.innerHTML = `<span>🛒</span><strong>Indkøbsliste</strong><span class="shopping-sub">Sø–Lø</span>`;
      shopCard.addEventListener('click', () => openShoppingList(key));
      col.appendChild(shopCard);
    }

    grid.appendChild(col);
  }
}

function makeMealCard(dateKey, mealType) {
  const card = document.createElement('div');
  card.className = 'meal-card';
  const mealData = state.plan[dateKey]?.[mealType];
  const label = document.createElement('div');
  label.className = `meal-label ${mealType}`;
  label.textContent = mealType === 'vegetarian' ? 'Vegetarret' : 'Børneret';
  card.appendChild(label);
  if (mealData?.name) {
    const name = document.createElement('div');
    name.className = 'meal-name';
    name.textContent = mealData.name;
    card.appendChild(name);
    if (mealData.ingredients?.length || mealData.instructions) {
      const hint = document.createElement('div');
      hint.className = 'meal-hint';
      hint.textContent = '📖 Se opskrift';
      card.appendChild(hint);
    }
  } else {
    const empty = document.createElement('div');
    empty.className = 'meal-empty';
    empty.textContent = 'Ingen ret planlagt';
    card.appendChild(empty);
  }
  card.addEventListener('click', () => openModal(dateKey, mealType));
  return card;
}

function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Recipe modal ── //
function openModal(dateKey, mealType) {
  editTarget = { date: dateKey, mealType };
  const d = new Date(dateKey + 'T12:00:00');
  const typeLabel = mealType === 'vegetarian' ? 'Vegetarret' : 'Børneret';
  document.getElementById('modal-meta').textContent = `${DAY_NAMES[dayOfWeekMon(d)]} ${formatDayDate(d)} · ${typeLabel}`;
  showViewMode(state.plan[dateKey]?.[mealType]);
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function scaleIngredient(ing, ratio) {
  if (ratio === 1) return ing;
  return ing.replace(/\b(\d+(?:[.,]\d+)?)/g, (_, num) => {
    const val = parseFloat(num.replace(',', '.')) * ratio;
    if (val >= 100) return Math.round(val).toString();
    if (val >= 10)  return (Math.round(val * 2) / 2).toString().replace('.', ',');
    if (val >= 1)   return (Math.round(val * 4) / 4).toString().replace('.', ',');
    return (Math.round(val * 8) / 8).toString().replace('.', ',');
  });
}

function renderIngredients(ingredients, ratio) {
  const list = document.getElementById('ingredients-list');
  list.innerHTML = '';
  ingredients.forEach(ing => {
    const li = document.createElement('li');
    li.textContent = scaleIngredient(ing, ratio);
    list.appendChild(li);
  });
}

function showViewMode(mealData) {
  document.getElementById('modal-title').textContent = mealData?.name || '—';
  document.getElementById('recipe-description').textContent = mealData?.description || '';

  const timeBadge = document.getElementById('time-badge');
  if (mealData?.total_time) {
    document.getElementById('time-value').textContent = mealData.total_time;
    timeBadge.style.display = '';
  } else { timeBadge.style.display = 'none'; }

  modalBaseIngredients = mealData?.ingredients || [];
  modalBaseServings = mealData?.servings || 0;
  modalServings = modalBaseServings;

  const servingsRow = document.getElementById('servings-row');
  if (modalBaseServings > 0) {
    document.getElementById('servings-count').textContent = modalServings;
    servingsRow.style.display = '';
  } else { servingsRow.style.display = 'none'; }

  const ratio = modalBaseServings > 0 ? modalServings / modalBaseServings : 1;
  if (modalBaseIngredients.length) {
    renderIngredients(modalBaseIngredients, ratio);
    document.getElementById('ingredients-section').style.display = '';
  } else {
    document.getElementById('ingredients-section').style.display = mealData ? 'none' : '';
  }

  const instr = mealData?.instructions || '';
  document.getElementById('instructions-text').textContent = instr;
  document.getElementById('instructions-section').style.display = instr ? '' : 'none';

  if (!mealData?.name) {
    document.getElementById('recipe-description').textContent = 'Ingen ret planlagt. Klik Rediger eller brug Generer uge.';
  }

  // Favorite button state
  const isFav = state.favorites.some(f => f.name === mealData?.name && f.meal_type === editTarget?.mealType);
  const favBtn = document.getElementById('modal-fav-btn');
  favBtn.textContent = isFav ? '★ Fjern favorit' : '⭐ Tilføj favorit';
  favBtn.classList.toggle('active', isFav);

  document.getElementById('modal-body').classList.remove('hidden');
  document.getElementById('modal-footer').classList.remove('hidden');
  document.getElementById('edit-mode').classList.remove('active');
  document.getElementById('edit-footer').classList.add('hidden');
}

function showEditMode() {
  const mealData = state.plan[editTarget.date]?.[editTarget.mealType];
  document.getElementById('edit-name').value = mealData?.name || '';
  document.getElementById('edit-description').value = mealData?.description || '';
  document.getElementById('edit-total-time').value = mealData?.total_time || '';
  document.getElementById('edit-servings').value = mealData?.servings || '';
  document.getElementById('edit-ingredients').value = (mealData?.ingredients || []).join('\n');
  document.getElementById('edit-instructions').value = mealData?.instructions || '';
  document.getElementById('edit-thaw').value = mealData?.thaw || '';
  document.getElementById('modal-body').classList.add('hidden');
  document.getElementById('modal-footer').classList.add('hidden');
  document.getElementById('edit-mode').classList.add('active');
  document.getElementById('edit-footer').classList.remove('hidden');
  document.getElementById('edit-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editTarget = null;
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === document.getElementById('modal-overlay')) closeModal(); });
document.getElementById('modal-edit-btn').addEventListener('click', showEditMode);
document.getElementById('edit-cancel').addEventListener('click', () => showViewMode(state.plan[editTarget?.date]?.[editTarget?.mealType]));

document.getElementById('servings-dec').addEventListener('click', () => {
  if (modalServings <= 1) return;
  modalServings--;
  document.getElementById('servings-count').textContent = modalServings;
  renderIngredients(modalBaseIngredients, modalBaseServings > 0 ? modalServings / modalBaseServings : 1);
});
document.getElementById('servings-inc').addEventListener('click', () => {
  modalServings++;
  document.getElementById('servings-count').textContent = modalServings;
  renderIngredients(modalBaseIngredients, modalBaseServings > 0 ? modalServings / modalBaseServings : 1);
});

document.getElementById('edit-save').addEventListener('click', async () => {
  if (!editTarget) return;
  const name = document.getElementById('edit-name').value.trim();
  if (!name) { showToast('Angiv venligst et navn'); return; }
  const meal = {
    name,
    description: document.getElementById('edit-description').value.trim(),
    total_time: document.getElementById('edit-total-time').value.trim(),
    servings: parseInt(document.getElementById('edit-servings').value) || 0,
    ingredients: document.getElementById('edit-ingredients').value.split('\n').map(s => s.trim()).filter(Boolean),
    instructions: document.getElementById('edit-instructions').value.trim(),
    thaw: document.getElementById('edit-thaw').value.trim(),
  };
  await fetch('api/meal', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: editTarget.date, meal_type: editTarget.mealType, ...meal }),
  });
  if (!state.plan[editTarget.date]) state.plan[editTarget.date] = {};
  state.plan[editTarget.date][editTarget.mealType] = meal;
  renderGrid();
  showViewMode(meal);
  showToast('Ret opdateret');
});

document.getElementById('modal-delete').addEventListener('click', async () => {
  if (!editTarget) return;
  await fetch(`api/meal?date_str=${editTarget.date}&meal_type=${editTarget.mealType}`, { method: 'DELETE' });
  if (state.plan[editTarget.date]) state.plan[editTarget.date][editTarget.mealType] = null;
  renderGrid();
  closeModal();
  showToast('Ret ryddet');
});

document.getElementById('modal-fav-btn').addEventListener('click', async () => {
  if (!editTarget) return;
  const mealData = state.plan[editTarget.date]?.[editTarget.mealType];
  if (!mealData?.name) return;
  const existing = state.favorites.find(f => f.name === mealData.name && f.meal_type === editTarget.mealType);
  if (existing) {
    await fetch(`api/favorites/${existing.id}`, { method: 'DELETE' });
    state.favorites = state.favorites.filter(f => f.id !== existing.id);
    showToast('Fjernet fra favoritter');
  } else {
    const res = await fetch('api/favorites', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: mealData.name, meal_type: editTarget.mealType, description: mealData.description || '' }),
    });
    const data = await res.json();
    await loadFavorites();
    showToast(data.duplicate ? 'Allerede i favoritter' : 'Tilføjet til favoritter');
  }
  showViewMode(mealData);
});

// ── Favorites modal ── //
document.getElementById('favs-btn').addEventListener('click', () => {
  renderFavsModal();
  document.getElementById('fav-overlay').classList.remove('hidden');
});
document.getElementById('fav-close').addEventListener('click', () => document.getElementById('fav-overlay').classList.add('hidden'));
document.getElementById('fav-overlay').addEventListener('click', e => { if (e.target === document.getElementById('fav-overlay')) document.getElementById('fav-overlay').classList.add('hidden'); });

function renderFavsModal() {
  const body = document.getElementById('fav-body');
  body.innerHTML = '';
  if (!state.favorites.length) {
    body.innerHTML = '<div class="fav-empty">Ingen favoritretter endnu. Åbn en opskrift og klik ⭐ for at tilføje.</div>';
    return;
  }
  const groups = { vegetarian: [], kids: [] };
  state.favorites.forEach(f => { if (groups[f.meal_type]) groups[f.meal_type].push(f); });

  [['vegetarian', 'Vegetarretter'], ['kids', 'Børneretter']].forEach(([type, label]) => {
    if (!groups[type].length) return;
    const lbl = document.createElement('div');
    lbl.className = 'fav-group-label';
    lbl.textContent = label;
    body.appendChild(lbl);
    groups[type].forEach(f => {
      const item = document.createElement('div');
      item.className = 'fav-item';
      item.innerHTML = `<div class="fav-item-name">${escapeHtml(f.name)}</div><button class="fav-remove" data-id="${f.id}">✕</button>`;
      item.querySelector('.fav-remove').addEventListener('click', async () => {
        await fetch(`api/favorites/${f.id}`, { method: 'DELETE' });
        state.favorites = state.favorites.filter(x => x.id !== f.id);
        renderFavsModal();
        showToast('Fjernet fra favoritter');
      });
      body.appendChild(item);
    });
  });
}

// ── Week tabs ── //
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.weekOffset = parseInt(tab.dataset.offset);
    renderGrid();
  });
});

// ── Generate ── //
document.getElementById('generate-btn').addEventListener('click', async () => {
  if (state.generating) return;
  state.generating = true;
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  const startDate = getStartDate(state.weekOffset);
  const baselineNames = {};
  for (let i = 0; i < 7; i++) {
    const key = isoDate(addDays(startDate, i));
    baselineNames[key] = state.plan[key]?.vegetarian?.name || state.plan[key]?.kids?.name || null;
  }

  try {
    const res = await fetch('api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_offset: state.weekOffset }),
    });
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { const err = await res.json(); detail = err.detail || detail; } catch (_) { detail = await res.text().catch(() => detail); }
      showToast(`Fejl: ${detail}`); return;
    }
    const weekPlan = await res.json();
    Object.assign(state.plan, weekPlan);
    renderGrid();
    showToast('Madplan genereret!');
  } catch (e) {
    if (e instanceof TypeError) {
      const plan = await pollForGeneratedPlan(state.weekOffset, baselineNames);
      if (plan) { Object.assign(state.plan, plan); renderGrid(); showToast('Madplan genereret!'); return; }
    }
    showToast(`Fejl: ${e.message}`);
  } finally {
    state.generating = false;
    btn.disabled = false;
    btn.textContent = 'Generer uge';
  }
});

// ── Polling helpers ── //
async function pollForGeneratedPlan(weekOffset, baselineNames, maxSeconds = 180, intervalMs = 5000) {
  const deadline = Date.now() + maxSeconds * 1000;
  const startDate = getStartDate(weekOffset);
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch('api/plan');
      if (!res.ok) continue;
      const plan = await res.json();
      let filled = 0;
      for (let i = 0; i < 7; i++) {
        const key = isoDate(addDays(startDate, i));
        const name = plan[key]?.vegetarian?.name || plan[key]?.kids?.name;
        if (name && name !== baselineNames[key]) filled++;
      }
      if (filled >= 4) return plan;
    } catch {}
  }
  return null;
}

async function pollForChatReply(baseline, maxSeconds = 180, intervalMs = 5000) {
  const deadline = Date.now() + maxSeconds * 1000;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch('api/chat-history');
      if (!res.ok) continue;
      const history = await res.json();
      const last = history[history.length - 1];
      if (history.length >= baseline + 2 && last?.role === 'assistant' && last.content) return last.content;
    } catch {}
  }
  return null;
}

// ── Chat ── //
document.getElementById('chat-toggle').addEventListener('click', () => {
  const panel = document.getElementById('chat-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    document.getElementById('chat-messages').scrollTop = 99999;
    document.getElementById('chat-input').focus();
  }
});

async function loadChatHistory() {
  const res = await fetch('api/chat-history');
  if (!res.ok) return;
  const history = await res.json();
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  history.forEach(m => appendMessage(m.role, m.content, false));
  container.scrollTop = 99999;
}

function appendMessage(role, content, scroll = true) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  container.appendChild(div);
  if (scroll) container.scrollTop = 99999;
}

function showThinking() {
  const el = document.createElement('div');
  el.className = 'thinking'; el.id = 'thinking';
  el.innerHTML = '<div class="dots"><span></span><span></span><span></span></div><span>Assistenten tænker…</span>';
  const c = document.getElementById('chat-messages');
  c.appendChild(el); c.scrollTop = 99999;
}
function hideThinking() { document.getElementById('thinking')?.remove(); }

async function sendChat() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message || state.sending) return;
  state.sending = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';
  input.value = ''; input.style.height = '36px';
  document.getElementById('chat-panel').classList.add('open');
  appendMessage('user', message);
  showThinking();

  let historyBaseline = null;
  try { const r = await fetch('api/chat-history'); if (r.ok) historyBaseline = (await r.json()).length; } catch {}

  try {
    const res = await fetch('api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message }),
    });
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { const err = await res.json(); detail = err.detail || detail; } catch (_) { detail = await res.text().catch(() => detail); }
      hideThinking(); appendMessage('assistant', `Fejl: ${detail}`); return;
    }
    const data = await res.json();
    hideThinking(); appendMessage('assistant', data.reply);
    if (data.plan) { Object.assign(state.plan, data.plan); renderGrid(); }
  } catch (e) {
    if (e instanceof TypeError && historyBaseline !== null) {
      const reply = await pollForChatReply(historyBaseline);
      if (reply) {
        hideThinking(); appendMessage('assistant', reply);
        try { const r = await fetch('api/plan'); if (r.ok) { Object.assign(state.plan, await r.json()); renderGrid(); } } catch {}
        return;
      }
    }
    hideThinking(); console.error('Chat fejl:', e);
    appendMessage('assistant', `⚠ Fejl: ${e.message}`);
  } finally {
    state.sending = false;
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
    input.focus();
  }
}

document.getElementById('send-btn').addEventListener('click', sendChat);
document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); } });
document.getElementById('chat-input').addEventListener('input', function() { this.style.height = '36px'; this.style.height = Math.min(this.scrollHeight, 110) + 'px'; });
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); document.getElementById('fav-overlay').classList.add('hidden'); } });

// ── Toast ── //
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Shopping list ── //
const STORE_META = {
  foetex:    { label: 'Føtex',    emoji: '🟢' },
  loevbjerg: { label: 'Løvbjerg', emoji: '🔵' },
  netto:     { label: 'Netto',    emoji: '🟡' },
  lidl:      { label: 'Lidl',     emoji: '🟠' },
  rema:      { label: 'Rema 1000',emoji: '🔴' },
  other:     { label: 'Generelt', emoji: '⚪' },
};
const STORE_ORDER = ['foetex', 'loevbjerg', 'netto', 'lidl', 'rema', 'other'];

let shopCurrentDate = null;
let shopActiveTab = 'foetex';
let shopData = null;

document.getElementById('shop-close').addEventListener('click', closeShoppingModal);
document.getElementById('shop-close-btn').addEventListener('click', closeShoppingModal);
document.getElementById('shop-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shop-overlay')) closeShoppingModal();
});
document.getElementById('shop-regenerate').addEventListener('click', () => {
  if (shopCurrentDate) openShoppingList(shopCurrentDate);
});

function closeShoppingModal() {
  document.getElementById('shop-overlay').classList.add('hidden');
}

async function openShoppingList(sundayDate) {
  shopCurrentDate = sundayDate;
  document.getElementById('shop-overlay').classList.remove('hidden');
  showShoppingSpinner();

  // snapshot for polling
  let snapshotDate = sundayDate;

  try {
    const res = await fetch('api/shopping-list', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ start_date: sundayDate }),
    });
    if (!res.ok) {
      let detail = `HTTP ${res.status}`;
      try { const err = await res.json(); detail = err.detail || detail; } catch (_) {}
      showShoppingError(`Fejl: ${detail}`); return;
    }
    shopData = await res.json();
    renderShoppingModal(shopData);
  } catch (e) {
    if (e instanceof TypeError) {
      const data = await pollForShoppingList(snapshotDate);
      if (data) { shopData = data; renderShoppingModal(data); return; }
    }
    showShoppingError(`Fejl: ${e.message}`);
  }
}

async function pollForShoppingList(startDate, maxSeconds = 180, intervalMs = 5000) {
  const deadline = Date.now() + maxSeconds * 1000;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, intervalMs));
    try {
      const res = await fetch(`api/shopping-list/latest?start_date=${startDate}`);
      if (res.ok) return await res.json();
    } catch {}
  }
  return null;
}

function showShoppingSpinner() {
  const d = new Date(shopCurrentDate + 'T12:00:00');
  const end = addDays(d, 6);
  document.getElementById('shop-subtitle').textContent =
    `${DAY_NAMES[dayOfWeekMon(d)]} ${formatDayDate(d)} – ${DAY_NAMES[dayOfWeekMon(end)]} ${formatDayDate(end)}`;
  document.getElementById('shop-badges').innerHTML = '';
  document.getElementById('shop-tabs').innerHTML = '';
  document.getElementById('shop-body').innerHTML =
    `<div class="thinking" style="padding:16px 0"><div class="dots"><span></span><span></span><span></span></div><span>Henter tilbud og laver indkøbsliste…</span></div>`;
}

function showShoppingError(msg) {
  document.getElementById('shop-body').innerHTML =
    `<div class="shop-empty">⚠ ${escapeHtml(msg)}</div>`;
}

function renderShoppingModal(data) {
  // Subtitle
  const d = new Date(data.start_date + 'T12:00:00');
  const end = new Date(data.end_date + 'T12:00:00');
  document.getElementById('shop-subtitle').textContent =
    `${DAY_NAMES[dayOfWeekMon(d)]} ${formatDayDate(d)} – ${DAY_NAMES[dayOfWeekMon(end)]} ${formatDayDate(end)}`;

  // Source badges
  const badgesEl = document.getElementById('shop-badges');
  badgesEl.innerHTML = '';
  if (data.has_salling_data) {
    const b = document.createElement('span');
    b.className = 'shop-badge live'; b.textContent = '📡 Salling (Føtex/Netto)';
    badgesEl.appendChild(b);
  }
  if (data.has_lidl_data) {
    const b = document.createElement('span');
    b.className = 'shop-badge live'; b.textContent = '📡 Lidl tilbudsavis';
    badgesEl.appendChild(b);
  }
  if (data.has_loevbjerg_data) {
    const b = document.createElement('span');
    b.className = 'shop-badge live'; b.textContent = '📡 Løvbjerg avis';
    badgesEl.appendChild(b);
  }
  if (data.has_rema_data) {
    const b = document.createElement('span');
    b.className = 'shop-badge live'; b.textContent = '📡 Rema 1000 tilbud';
    badgesEl.appendChild(b);
  }
  if (!data.has_salling_data && !data.has_lidl_data && !data.has_loevbjerg_data && !data.has_rema_data) {
    const b = document.createElement('span');
    b.className = 'shop-badge ai'; b.textContent = '⚪ Ingen live tilbudsdata';
    badgesEl.appendChild(b);
  }

  // Tabs
  const tabsEl = document.getElementById('shop-tabs');
  tabsEl.innerHTML = '';
  const stores = data.stores || {};
  STORE_ORDER.forEach(key => {
    const meta = STORE_META[key];
    const count = (stores[key] || []).length;
    const btn = document.createElement('button');
    btn.className = `shop-tab${key === shopActiveTab ? ' active' : ''}`;
    btn.dataset.store = key;
    btn.innerHTML = `${meta.emoji} ${meta.label}<span class="shop-count">${count}</span>`;
    btn.addEventListener('click', () => {
      shopActiveTab = key;
      document.querySelectorAll('.shop-tab').forEach(t => t.classList.toggle('active', t.dataset.store === key));
      renderStoreItems(stores[key] || []);
    });
    tabsEl.appendChild(btn);
  });

  // Open the first tab that has items, or 'other' as final fallback
  const firstWithItems = STORE_ORDER.find(k => (stores[k] || []).length > 0) || 'other';
  if (!stores[shopActiveTab]?.length) shopActiveTab = firstWithItems;
  document.querySelectorAll('.shop-tab').forEach(t => t.classList.toggle('active', t.dataset.store === shopActiveTab));
  renderStoreItems(stores[shopActiveTab] || []);
}

function renderStoreItems(items) {
  const body = document.getElementById('shop-body');
  if (!items.length) {
    body.innerHTML = '<div class="shop-empty">Ingen varer tildelt denne butik.</div>';
    return;
  }
  body.innerHTML = '';
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'shop-item';

    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'shop-checkbox';
    cb.addEventListener('change', () => {
      textEl.style.textDecoration = cb.checked ? 'line-through' : '';
      textEl.style.opacity = cb.checked ? '0.45' : '';
    });
    row.appendChild(cb);

    // Detect "(TILBUD: X kr)" pattern and render as badge
    const tilbudMatch = item.match(/^(.*?)\s*\(TILBUD:\s*(.+?)\)\s*$/i);
    const textEl = document.createElement('div');
    textEl.className = 'shop-item-text';
    if (tilbudMatch) {
      textEl.innerHTML = escapeHtml(tilbudMatch[1]) +
        `<span class="tilbud-badge">TILBUD ${escapeHtml(tilbudMatch[2])}</span>`;
    } else {
      textEl.textContent = item;
    }
    row.appendChild(textEl);
    body.appendChild(row);
  });
}

// ── Init ── //
(async () => { await Promise.all([loadPlan(), loadFavorites(), loadChatHistory()]); })();
</script>
