<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madplan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #14171f; --surface2: #1c2030;
    --border: #252a3a; --accent: #4af0a0; --accent2: #f0c44a;
    --text: #e8eaf0; --muted: #5a6080;
    --radius: 12px;
    --lunch-color: #4af0a0; --dinner-color: #f0c44a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 20px; display: flex; align-items: center;
    justify-content: space-between; flex-shrink: 0; gap: 12px; z-index: 10;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .logo {
    width: 36px; height: 36px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px;
  }
  .header-text h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; letter-spacing: 0.02em; }
  .header-text p { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .week-tabs { display: flex; gap: 4px; }
  .tab {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px;
    border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .tab:hover { border-color: var(--accent); color: var(--accent); }
  .tab.active { border-color: var(--accent); color: var(--accent); background: rgba(74,240,160,0.08); }

  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn {
    background: var(--accent); border: none; color: #0d0f14;
    font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500;
    padding: 7px 14px; border-radius: 8px; cursor: pointer; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-ghost {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-family: 'DM Mono', monospace; font-size: 11px;
    padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Main layout ── */
  .main { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  /* ── Meal grid ── */
  #grid-container {
    flex: 1; overflow-x: auto; overflow-y: auto; padding: 16px;
  }
  .meal-grid {
    display: grid;
    grid-template-columns: repeat(7, minmax(140px, 1fr));
    gap: 10px;
    min-width: 980px;
  }

  .day-col { display: flex; flex-direction: column; gap: 8px; }

  .day-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; text-align: center;
  }
  .day-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 12px; }
  .day-date { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .day-header.today { border-color: var(--accent); }
  .day-header.today .day-name { color: var(--accent); }

  .meal-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px; cursor: pointer;
    transition: border-color 0.15s; min-height: 90px; position: relative;
    display: flex; flex-direction: column; gap: 4px;
  }
  .meal-card:hover { border-color: var(--surface2); background: var(--surface2); }
  .meal-label {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
  }
  .meal-label.lunch { color: var(--lunch-color); }
  .meal-label.dinner { color: var(--dinner-color); }
  .meal-name { font-size: 12px; color: var(--text); line-height: 1.4; flex: 1; }
  .meal-desc { font-size: 10px; color: var(--muted); line-height: 1.4; }
  .meal-empty { font-size: 11px; color: var(--muted); font-style: italic; flex: 1; display: flex; align-items: center; }
  .meal-edit-btn {
    position: absolute; top: 6px; right: 6px;
    background: none; border: none; color: var(--muted); font-size: 13px;
    cursor: pointer; opacity: 0; transition: opacity 0.15s; line-height: 1;
  }
  .meal-card:hover .meal-edit-btn { opacity: 1; }
  .meal-edit-btn:hover { color: var(--accent); }

  /* ── Chat panel ── */
  #chat-panel {
    background: var(--surface); border-top: 1px solid var(--border);
    flex-shrink: 0; display: flex; flex-direction: column;
    transition: height 0.25s ease;
    height: 48px; overflow: hidden;
  }
  #chat-panel.open { height: 300px; }

  #chat-toggle {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; user-select: none; flex-shrink: 0;
    font-size: 12px; color: var(--muted);
  }
  #chat-toggle:hover { color: var(--text); }
  #chat-toggle .toggle-label { display: flex; align-items: center; gap: 8px; }
  #chat-toggle .chevron { font-size: 10px; transition: transform 0.2s; }
  #chat-panel.open #chat-toggle .chevron { transform: rotate(180deg); }

  #chat-messages {
    flex: 1; overflow-y: auto; padding: 0 16px 8px; display: flex; flex-direction: column; gap: 8px;
  }
  #chat-messages::-webkit-scrollbar { width: 3px; }
  #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 80%; padding: 8px 12px; border-radius: 10px; font-size: 12px; line-height: 1.5; }
  .msg.user { background: var(--surface2); border: 1px solid var(--border); align-self: flex-end; color: var(--text); }
  .msg.assistant { background: rgba(74,240,160,0.07); border: 1px solid rgba(74,240,160,0.2); align-self: flex-start; color: var(--text); }

  #chat-input-row {
    display: flex; gap: 8px; padding: 8px 16px 12px; flex-shrink: 0;
  }
  #chat-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 12px; border-radius: 8px; resize: none; height: 38px;
    transition: border-color 0.15s; outline: none;
  }
  #chat-input:focus { border-color: var(--accent); }
  #chat-input::placeholder { color: var(--muted); }

  /* ── Edit modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; width: 100%; max-width: 400px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; }
  .modal label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 4px; }
  .modal input, .modal textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 8px 10px; border-radius: 8px; outline: none; transition: border-color 0.15s;
  }
  .modal input:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 60px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-danger { background: none; border: 1px solid #f06060; color: #f06060; font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 12px; border-radius: 8px; cursor: pointer; }
  .btn-danger:hover { background: rgba(240,96,96,0.1); }

  /* ── Spinner ── */
  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(74,240,160,0.3);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--accent);
    color: var(--text); font-size: 12px; padding: 8px 16px;
    border-radius: 8px; z-index: 200; opacity: 0;
    transition: opacity 0.2s; pointer-events: none;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">🥗</div>
    <div class="header-text">
      <h1>Madplan</h1>
      <p>Vegetarian family meal planner</p>
    </div>
  </div>

  <div class="week-tabs">
    <button class="tab active" data-offset="0">This week</button>
    <button class="tab" data-offset="1">Next week</button>
    <button class="tab" data-offset="2">In 2 weeks</button>
  </div>

  <div class="header-right">
    <button class="btn" id="generate-btn">Generate week</button>
  </div>
</header>

<div class="main">
  <div id="grid-container">
    <div class="meal-grid" id="meal-grid"></div>
  </div>

  <div id="chat-panel">
    <div id="chat-toggle">
      <div class="toggle-label">
        <span>Chat with assistant</span>
        <span id="chat-status"></span>
      </div>
      <span class="chevron">▲</span>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <textarea id="chat-input" placeholder="Ask the assistant to change something… e.g. 'Make Thursday dinner a soup' or 'Replace all lunches next week'"></textarea>
      <button class="btn" id="send-btn">Send</button>
    </div>
  </div>
</div>

<!-- Edit meal modal -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <h2 id="modal-title">Edit meal</h2>
    <div>
      <label>Meal name</label>
      <input type="text" id="modal-name" placeholder="e.g. Pasta with tomato sauce">
    </div>
    <div>
      <label>Description (optional)</label>
      <textarea id="modal-desc" placeholder="Brief description…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-danger" id="modal-delete">Clear meal</button>
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-save">Save</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

let state = {
  plan: {},
  weekOffset: 0,
  generating: false,
  sending: false,
};

let editTarget = null; // { date, mealType }

// ── Date helpers ── //
function getMonday(d) {
  const day = d.getDay() || 7;
  const mon = new Date(d);
  mon.setDate(d.getDate() - day + 1);
  mon.setHours(0,0,0,0);
  return mon;
}

function addDays(d, n) {
  const r = new Date(d);
  r.setDate(r.getDate() + n);
  return r;
}

function isoDate(d) {
  return d.toISOString().slice(0,10);
}

function todayISO() {
  return isoDate(new Date());
}

function formatDayDate(d) {
  return `${d.getDate()} ${MONTH_NAMES[d.getMonth()]}`;
}

// ── Load plan ── //
async function loadPlan() {
  const res = await fetch('/api/plan');
  if (!res.ok) return;
  state.plan = await res.json();
  renderGrid();
}

// ── Render grid ── //
function renderGrid() {
  const grid = document.getElementById('meal-grid');
  const today = todayISO();
  const thisMonday = getMonday(new Date());
  const weekStart = new Date(thisMonday);
  weekStart.setDate(thisMonday.getDate() + state.weekOffset * 7);

  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d = addDays(weekStart, i);
    const key = isoDate(d);
    const isToday = key === today;

    const col = document.createElement('div');
    col.className = 'day-col';

    // Day header
    const header = document.createElement('div');
    header.className = `day-header${isToday ? ' today' : ''}`;
    header.innerHTML = `<div class="day-name">${DAY_NAMES[i]}</div><div class="day-date">${formatDayDate(d)}</div>`;
    col.appendChild(header);

    // Lunch card
    col.appendChild(makeMealCard(key, 'lunch', d));
    // Dinner card
    col.appendChild(makeMealCard(key, 'dinner', d));

    grid.appendChild(col);
  }
}

function makeMealCard(dateKey, mealType, d) {
  const card = document.createElement('div');
  card.className = 'meal-card';

  const mealData = state.plan[dateKey]?.[mealType];
  const label = document.createElement('div');
  label.className = `meal-label ${mealType}`;
  label.textContent = mealType.charAt(0).toUpperCase() + mealType.slice(1);
  card.appendChild(label);

  if (mealData && mealData.name) {
    const name = document.createElement('div');
    name.className = 'meal-name';
    name.textContent = mealData.name;
    card.appendChild(name);

    if (mealData.description) {
      const desc = document.createElement('div');
      desc.className = 'meal-desc';
      desc.textContent = mealData.description;
      card.appendChild(desc);
    }
  } else {
    const empty = document.createElement('div');
    empty.className = 'meal-empty';
    empty.textContent = 'No meal planned';
    card.appendChild(empty);
  }

  const editBtn = document.createElement('button');
  editBtn.className = 'meal-edit-btn';
  editBtn.textContent = '✎';
  editBtn.title = 'Edit meal';
  editBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    openEditModal(dateKey, mealType, mealData);
  });
  card.appendChild(editBtn);

  card.addEventListener('click', () => openEditModal(dateKey, mealType, mealData));
  return card;
}

// ── Edit modal ── //
function openEditModal(dateKey, mealType, mealData) {
  editTarget = { date: dateKey, mealType };
  const d = new Date(dateKey + 'T00:00:00');
  const dayName = DAY_NAMES[d.getDay() === 0 ? 6 : d.getDay() - 1];
  document.getElementById('modal-title').textContent =
    `${dayName} · ${mealType.charAt(0).toUpperCase() + mealType.slice(1)}`;
  document.getElementById('modal-name').value = mealData?.name || '';
  document.getElementById('modal-desc').value = mealData?.description || '';
  document.getElementById('modal-overlay').classList.remove('hidden');
  document.getElementById('modal-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  editTarget = null;
}

document.getElementById('modal-cancel').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('modal-save').addEventListener('click', async () => {
  if (!editTarget) return;
  const name = document.getElementById('modal-name').value.trim();
  if (!name) { showToast('Please enter a meal name'); return; }
  const desc = document.getElementById('modal-desc').value.trim();
  await fetch('/api/meal', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ date: editTarget.date, meal_type: editTarget.mealType, name, description: desc }),
  });
  if (!state.plan[editTarget.date]) state.plan[editTarget.date] = {};
  state.plan[editTarget.date][editTarget.mealType] = { name, description: desc };
  renderGrid();
  closeModal();
  showToast('Meal updated');
});

document.getElementById('modal-delete').addEventListener('click', async () => {
  if (!editTarget) return;
  await fetch(`/api/meal?date_str=${editTarget.date}&meal_type=${editTarget.mealType}`, { method: 'DELETE' });
  if (state.plan[editTarget.date]) {
    state.plan[editTarget.date][editTarget.mealType] = null;
  }
  renderGrid();
  closeModal();
  showToast('Meal cleared');
});

// ── Week tabs ── //
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.weekOffset = parseInt(tab.dataset.offset);
    renderGrid();
  });
});

// ── Generate week ── //
document.getElementById('generate-btn').addEventListener('click', async () => {
  if (state.generating) return;
  state.generating = true;
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ week_offset: state.weekOffset }),
    });
    if (!res.ok) {
      const err = await res.json();
      showToast(`Error: ${err.detail || 'Generation failed'}`);
      return;
    }
    const weekPlan = await res.json();
    Object.assign(state.plan, weekPlan);
    renderGrid();
    showToast('Meal plan generated!');
  } catch (e) {
    showToast('Generation failed — check API key');
  } finally {
    state.generating = false;
    btn.disabled = false;
    btn.textContent = 'Generate week';
  }
});

// ── Chat ── //
document.getElementById('chat-toggle').addEventListener('click', () => {
  const panel = document.getElementById('chat-panel');
  panel.classList.toggle('open');
  if (panel.classList.contains('open')) {
    const msgs = document.getElementById('chat-messages');
    msgs.scrollTop = msgs.scrollHeight;
    document.getElementById('chat-input').focus();
  }
});

async function loadChatHistory() {
  const res = await fetch('/api/chat-history');
  if (!res.ok) return;
  const history = await res.json();
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  history.forEach(msg => appendMessage(msg.role, msg.content, false));
  container.scrollTop = container.scrollHeight;
}

function appendMessage(role, content, scroll = true) {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = content;
  container.appendChild(div);
  if (scroll) container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = document.getElementById('chat-input');
  const message = input.value.trim();
  if (!message || state.sending) return;

  state.sending = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="spinner"></span>';
  input.value = '';
  input.style.height = '38px';

  // Ensure chat is open
  document.getElementById('chat-panel').classList.add('open');
  appendMessage('user', message);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, week_offset: state.weekOffset }),
    });
    if (!res.ok) {
      const err = await res.json();
      appendMessage('assistant', `Error: ${err.detail || 'Something went wrong'}`);
      return;
    }
    const data = await res.json();
    appendMessage('assistant', data.reply);
    if (data.plan) {
      Object.assign(state.plan, data.plan);
      renderGrid();
    }
  } catch (e) {
    appendMessage('assistant', 'Failed to reach assistant — check your API key.');
  } finally {
    state.sending = false;
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
    input.focus();
  }
}

document.getElementById('send-btn').addEventListener('click', sendChat);
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
});

// Auto-resize textarea
document.getElementById('chat-input').addEventListener('input', function() {
  this.style.height = '38px';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Keyboard: Escape closes modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

// ── Toast ── //
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── Init ── //
loadPlan();
loadChatHistory();
</script>
</body>
</html>
